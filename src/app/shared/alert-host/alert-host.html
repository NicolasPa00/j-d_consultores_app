<!-- ============ STACK DE TOASTS ============ -->
<div class="toast-stack" aria-live="polite">
  @for (t of alert.toasts(); track t.id) {
    <div class="al-toast" [class]="'al-toast--' + t.kind" role="status">
      <span class="al-toast__icon" aria-hidden="true">
        @switch (t.kind) {
          @case ('success') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9" />
              <path d="m8.5 12 2.5 2.5 4.5-5" />
            </svg>
          }
          @case ('error') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9" />
              <path d="M12 8v5M12 16h.01" />
            </svg>
          }
          @case ('warning') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />
              <path d="M12 9v4M12 17h.01" />
            </svg>
          }
          @default {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9" />
              <path d="M12 11v5M12 8h.01" />
            </svg>
          }
        }
      </span>
      <span class="al-toast__msg">{{ t.message }}</span>
      <button type="button" class="al-toast__close" (click)="alert.dismiss(t.id)" aria-label="Cerrar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </div>
  }
</div>

<!-- ============ DIÁLOGO DE CONFIRMACIÓN ============ -->
@if (alert.confirmRequest(); as req) {
  <div class="al-backdrop" (click)="alert.cancelConfirm()"></div>
  <div class="al-dialog" [class.al-dialog--danger]="req.tone === 'danger'" role="alertdialog" aria-modal="true" aria-labelledby="alDialogTitle">
    <div class="al-dialog__icon" aria-hidden="true">
      @if (req.tone === 'danger') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />
          <path d="M12 9v4M12 17h.01" />
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9" />
          <path d="M12 11v5M12 8h.01" />
        </svg>
      }
    </div>
    <h3 class="al-dialog__title" id="alDialogTitle">{{ req.title }}</h3>
    <p class="al-dialog__msg">{{ req.message }}</p>
    <div class="al-dialog__actions">
      <button type="button" class="btn btn--ghost" (click)="alert.cancelConfirm()">{{ req.cancelText }}</button>
      <button
        type="button"
        class="btn"
        [class.btn--primary]="req.tone !== 'danger'"
        [class.btn--danger]="req.tone === 'danger'"
        (click)="alert.accept()"
      >
        {{ req.confirmText }}
      </button>
    </div>
  </div>
}
